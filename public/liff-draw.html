<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2026 全障運應援抽獎</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, sans-serif;
      background: linear-gradient(180deg, #f5f3ff 0%, #ffffff 100%);
      color: #111827;
    }
    .wrap {
      max-width: 480px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 20px 16px 32px;
    }
    .card {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .hero {
      background: linear-gradient(135deg, #805AD5 0%, #6B46C1 100%);
      color: #fff;
      padding: 20px;
    }
    .hero .tag {
      font-size: 12px;
      color: #D6BCFA;
      margin-bottom: 8px;
    }
    .hero h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.3;
    }
    .hero p {
      margin: 10px 0 0;
      font-size: 14px;
      color: #ECE8F3;
      line-height: 1.6;
    }
    .body {
      padding: 18px;
    }
    .status {
      text-align: center;
      margin-bottom: 14px;
      font-size: 15px;
      color: #374151;
      min-height: 24px;
    }
    .slot {
      border-radius: 18px;
      overflow: hidden;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
    }
    .slot img {
      display: none;
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
    }
    .slot img.active {
      display: block;
    }
    .result-box {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 16px;
      background: #f5f3ff;
      border: 1px solid #c4b5fd;
    }
    .result-box.show {
      display: block;
    }
    .result-title {
      font-size: 22px;
      font-weight: 800;
      color: #6B46C1;
      margin-bottom: 10px;
      white-space: pre-line;
    }
    .result-desc {
      font-size: 15px;
      color: #374151;
      margin-bottom: 14px;
      white-space: pre-line;
      line-height: 1.7;
    }
    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }
    .btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    .btn-primary {
      background: #6B46C1;
      color: #fff;
      box-shadow: 0 8px 20px rgba(107,70,193,.25);
    }
    .btn-secondary {
      background: #111827;
      color: #fff;
      margin-top: 10px;
    }
    .hint {
      margin-top: 14px;
      font-size: 13px;
      color: #6b7280;
      text-align: center;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="hero">
        <div class="tag">🏃‍♂️ 2026 全障運應援活動</div>
        <h1>應援抽獎</h1>
        <p>人人有獎，最高價值 1 萬元，立即試試手氣 🎁</p>
      </div>

      <div class="body">
        <div id="loading" class="loading">載入中...</div>

        <div id="main" style="display:none;">
          <div id="status" class="status">準備好了就開始抽獎 🎁</div>

          <div class="slot">
            <img id="img0" src="/assets/GET_0.jpg" class="active" />
            <img id="img1" src="/assets/GET_toner.jpg" />
            <img id="img2" src="/assets/GET_M310.jpg" />
          </div>

          <button id="drawBtn" class="btn btn-primary">立即抽獎</button>

          <div id="resultBox" class="result-box">
            <div id="resultTitle" class="result-title"></div>
            <div id="resultDesc" class="result-desc"></div>
            <button id="claimBtn" class="btn btn-primary">回 LINE 領優惠券</button>
            <button id="closeBtn" class="btn btn-secondary">關閉</button>
          </div>

          <div class="hint">
            每人限抽一次
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const LIFF_ID = '2009521956-OmBMwwQz';

    let drawing = false;
    let accessToken = '';
    let currentPrize = null;

    function showImage(index) {
      document.querySelectorAll('.slot img').forEach((el, idx) => {
        el.classList.toggle('active', idx === index);
      });
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    async function postJson(url, body) {
      const resp = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });

      const data = await resp.json().catch(() => ({}));

      if (!resp.ok) {
        throw new Error(data.error || `${url} failed: ${resp.status}`);
      }

      return data;
    }

    function applyPrizeToUI(prize) {
      currentPrize = prize;
      showImage(prize.imageIndex);
      document.getElementById('resultTitle').textContent = prize.title;
      document.getElementById('resultDesc').textContent = prize.desc;
      document.getElementById('resultBox').classList.add('show');
    }

    async function playAnimation(finalPrize) {
      const sequence = [2, 1, 0, 2, 1, 0, 2, 1, 0];
      let delay = 120;

      document.getElementById('status').textContent = '抽獎進行中，請稍候...';

      for (const i of sequence) {
        showImage(i);
        await sleep(delay);
        delay += 35;
      }

      showImage(0);
      document.getElementById('status').textContent = '結果即將揭曉...';
      await sleep(900);

      showImage(1);
      await sleep(250);
      showImage(2);
      await sleep(250);

      showImage(finalPrize.imageIndex);
      await sleep(300);
    }

    async function checkStatus() {
      const data = await postJson('/api/draw/status', { accessToken });

      if (!data.alreadyDrawn) return;

      document.getElementById('drawBtn').style.display = 'none';

      if (data.claimed) {
        document.getElementById('status').textContent = '您已完成本次抽獎';
        document.getElementById('resultTitle').textContent = '您已完成本次抽獎';
        document.getElementById('resultDesc').textContent =
          '可直接回 LINE 查看您已收到的優惠與說明';
      } else {
        document.getElementById('status').textContent = '您已完成本次抽獎';
        document.getElementById('resultTitle').textContent = '您已完成本次抽獎';
        document.getElementById('resultDesc').textContent =
          '請點擊下方按鈕，先前往您的優惠券頁面';
      }

      currentPrize = data.prize;
      showImage(data.prize.imageIndex);
      document.getElementById('resultBox').classList.add('show');
    }

    async function draw() {
      if (drawing) return;

      drawing = true;
      document.getElementById('drawBtn').disabled = true;
      document.getElementById('resultBox').classList.remove('show');

      try {
        const data = await postJson('/api/draw', { accessToken });

        if (data.alreadyDrawn) {
          document.getElementById('drawBtn').style.display = 'none';

          if (data.claimed) {
            document.getElementById('status').textContent = '您已完成本次抽獎';
            document.getElementById('resultTitle').textContent = '您已完成本次抽獎';
            document.getElementById('resultDesc').textContent =
              '可直接回 LINE 查看您已收到的優惠與說明';
          } else {
            document.getElementById('status').textContent = '您已完成本次抽獎';
            document.getElementById('resultTitle').textContent = '您已完成本次抽獎';
            document.getElementById('resultDesc').textContent =
              '請點擊下方按鈕，先前往您的優惠券頁面';
          }

          currentPrize = data.prize;
          showImage(data.prize.imageIndex);
          document.getElementById('resultBox').classList.add('show');
          return;
        }

        await playAnimation(data.prize);
        currentPrize = data.prize;
        document.getElementById('status').textContent = '抽獎完成 🎉';
        applyPrizeToUI(data.prize);
        document.getElementById('drawBtn').style.display = 'none';
      } catch (err) {
        console.error('draw error:', err);
        document.getElementById('status').textContent = '抽獎失敗，請稍後再試。';
        document.getElementById('drawBtn').disabled = false;
      } finally {
        drawing = false;
      }
    }

    async function claimPrize() {
      if (!currentPrize) return;

      const claimBtn = document.getElementById('claimBtn');
      claimBtn.disabled = true;
      claimBtn.textContent = '處理中...';

      try {
        await postJson('/api/claim', { accessToken });
        await postJson('/api/push-after-draw', { accessToken });

        window.location.href = currentPrize.couponUrl;
      } catch (err) {
        console.error('claimPrize error:', err);
        document.getElementById('status').textContent = '處理失敗，請稍後再試。';
        claimBtn.disabled = false;
        claimBtn.textContent = '回 LINE 領優惠券';
      }
    }

    async function init() {
      try {
        await liff.init({ liffId: LIFF_ID });

        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }

        accessToken = liff.getAccessToken();

        document.getElementById('loading').style.display = 'none';
        document.getElementById('main').style.display = 'block';

        await checkStatus();
      } catch (err) {
        console.error('init error:', err);
        document.getElementById('loading').textContent = '載入失敗，請回 LINE 重新開啟。';
      }
    }

    document.getElementById('drawBtn').addEventListener('click', draw);
    document.getElementById('claimBtn').addEventListener('click', claimPrize);
    document.getElementById('closeBtn').addEventListener('click', () => {
      if (typeof liff !== 'undefined' && liff.isInClient()) {
        liff.closeWindow();
      } else {
        window.close();
      }
    });

    init();
  </script>
</body>
</html>
